name: "Scrape Tables - 23f3001476@ds.study.iitm.ac.in"

on: [push]

jobs:
  scrape:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: "Install 23f3001476@ds.study.iitm.ac.in"
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: "Install dependencies for 23f3001476@ds.study.iitm.ac.in"
      run: npm install
      
    - name: "Install Playwright browsers for 23f3001476@ds.study.iitm.ac.in"
      run: npx playwright install --with-deps chromium
      
    - name: "Run scraper - 23f3001476@ds.study.iitm.ac.in"
      run: npm run scrape
